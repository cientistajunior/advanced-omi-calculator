<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Advanced Omi Calculator</title>
        <link rel="stylesheet" href="styles.css">
        <script src="main.js" defer></script>
    </head>
    <body>
        <header>
             <h1 class="title">Advanced omi Calculator</h1>
        </header>
        <main>

            <p class="result"></p>

            <section class="btn-operator-number">
                <button class="plus">+</button> <!--plus-->
                <button class="minus">-</button> <!--minus-->
                <button class="divid">/</button> <!--divided by-->
                <button class="times">*</button> <!--times-->
                <button class="clear">Clear</button> <!--clear-->

            </section>
            
            <section class="btn-advanced-operators">
                <button class="fib">fib</button>
                <button class="sqrt">Sqrt</button>
                <button class="mod">Mod</button>
                <button class="pow">Pow</button>
            </section>

            <section class="number-calculator">
                <button class="nine">9</button>
                <button class="eight">8</button>
                <button class="seven">7</button>
                <button class="six">6</button>
                <button class="five">5</button>
                <button class="four">4</button>
                <button class="three">3</button>
                <button class="two">2</button>
                <button class="one">1</button>
                <button class="zero">0</button>
                <button class="equal">=</button>
            </section>
            
        </main>
        <footer>
            <p>Made by Wilson in 2026</p>
        </footer>
    </body>
</html>
