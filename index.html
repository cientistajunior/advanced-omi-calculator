<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Advanced Omi Calculator</title>
        <link rel="stylesheet" href="styles.css">
        <script src="main.js" defer></script>
    </head>
    <body>
        <header>
             <h1 class="title">Advanced omi Calculator</h1>
        </header>
        <main>

            <p class="result"></p>

            <section class="calculator-grid">
            <!--operator advanced-->    
                <button class="clear">Clear</button> <!--clear-->
                <button class="fib">fib</button> <!--fibonacci-->
                <button class="sqrt">Sqrt</button> <!--raiz quadrada-->
                <button class="mod">Mod</button> <!--resto da divisão-->
                <button class="pow">Pow</button> <!--potencia-->
            <!--operator numeric-->
                <button class="plus">+</button> <!--plus-->
                <button class="minus">-</button> <!--minus-->
                <button class="divid">/</button> <!--divided by-->
                <button class="times">*</button> <!--times-->

            <!--number calculator-->
                <button class="nine">9</button>
                <button class="eight">8</button>
                <button class="seven">7</button>
                <button class="six">6</button>
                <button class="five">4</button>
                <button class="four">5</button>
                <button class="three">6</button>
                <button class="two">1</button>
                <button class="one">2</button>
                <button class="zero">3</button>
                <button class="equal">=</button>
            </section>
        </main>
        <footer>
            <p>Made by Wilson in 2026</p>
        </footer>
    </body>
</html>
